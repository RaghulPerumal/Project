spring.application.name=Learning
server.port=8081

# Enabling H2 Console
spring.h2.console.enabled=true
#Turn Statistics on
#spring.jpa.properties.hibernate.generate_statistics=true
#logging.level.org.hibernate.stat=debug
# Show all queries
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.type=trace
spring.datasource.url=jdbc:h2:mem:testdb
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

spring.cloud.config.enabled=false

# Enable Feign client logging
logging.level.com.example.Learning.FeignClient.JsonPlaceholderClient=INFO

# Feign client connect and read timeouts (milliseconds)
# connectTimeout: Max time to wait to establish a connection to the remote server.
# readTimeout: Max time to wait for the response after a connection is established.
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# Disable/Enable retry. Start retrying after 100 ms. Wait up to 1000 ms between retries. Try up to 3 times total (original + 2 retries).
#feign.client.config.default.retryer=periodic 100 1000 3
# or disable
 feign.client.config.default.retryer=none

##Circuit Breaker
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.registerHealthIndicator=true
# last 10 calls (successful or failed) used to calculate the failure rate
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.slidingWindowSize=10
# Until n calls are made, it will remain in a closed state and won't evaluate for opening
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.minimumNumberOfCalls=5
# If more than 50% of the calls fail (within the sliding window), the circuit breaker will open.
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.failureRateThreshold=50
# After the circuit breaker opens, it will wait 10 seconds before transitioning to half-open state.
# In half-open, it allows a few test calls to check if the issue is resolved.
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.waitDurationInOpenState=10s
# When in half-open state, only 3 test calls are allowed. If they all succeed, circuit breaker closes again.
# If any of them fail (and still exceed thresholds), it re-opens.
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
# If more than 50% of the calls are slow, they are counted as failures.
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.slowCallRateThreshold=50
# Defines the threshold (2 seconds) for what counts as a slow call
resilience4j.circuitbreaker.instances.jsonPlaceholderCircuitBreaker.slowCallDurationThreshold=2s

#Retry
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=2s

#@Retry runs first:
#It attempts the method up to 3 times (1 original + 2 retries).
#If one of those calls succeeds, everything is fine.
#If all 3 attempts fail, the exception is passed on to the next layer.
#@CircuitBreaker sees this as 1 failed call:
#Circuit breaker only sees the final result of the retry block.
#So, no matter how many retries happen, circuit breaker only records 1 success or 1 failure.
#That result (pass or fail) contributes to the sliding window used by the circuit breaker.

resilience4j.bulkhead.configs.default.maxConcurrentCalls=5
resilience4j.bulkhead.configs.default.maxWaitDuration=2s
