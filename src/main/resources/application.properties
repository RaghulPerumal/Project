spring.application.name=Learning
server.port=8081

# Enabling H2 Console
spring.h2.console.enabled=true
#Turn Statistics on
#spring.jpa.properties.hibernate.generate_statistics=true
#logging.level.org.hibernate.stat=debug
# Show all queries
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.type=trace
spring.datasource.url=jdbc:h2:mem:testdb
spring.data.jpa.repositories.bootstrap-mode=default
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

spring.cloud.config.enabled=false

## Enable Feign client logging
#logging.level.com.example.yourfeignclient=DEBUG
#
## Feign client connect and read timeouts (milliseconds)
#feign.client.config.default.connectTimeout=5000
#feign.client.config.default.readTimeout=5000
#
## Disable/Enable retry
#feign.client.config.default.retryer=periodic 100 1000 3
## or disable
## feign.client.config.default.retryer=none